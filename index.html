<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixie Photobooth 🧚✨</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <div class="booth-card">
    
    <h1 class="main-title">✨ PHOTOBOOTH ✨</h1>
    <p class="subtitle">มาบันทึกความทรงจำสุดน่ารักกันจ้าาา 💕</p>
    
    <div class="settings-container">
      <div class="setting-item">
        <label>🎨 Theme:</label>
        <select id="themeSelect">
          <option value="pink">🌸 Pink Kawaii</option>
          <option value="black">🖤 Black Minimalist</option>
          <option value="blue">💎 Sky Blue</option>
          <option value="retro">🎞️ Retro Film</option>
        </select>
      </div>
      
      <div class="setting-item">
        <label>📸 Photos:</label>
        <select id="photoCountSelect">
          <option value="1">1 รูป (Single)</option>
          <option value="2">2 รูป (Twin)</option>
          <option value="3">3 รูป (Triple)</option>
          <option value="4" selected>4 รูป (Standard)</option>
          <option value="5">5 รูป (Pentagon)</option>
          <option value="6">6 รูป (Maxi)</option>
        </select>
      </div>
    </div>
    
    <div class="camera-wrapper">
      <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div id="countdown">3</div>
        <div id="flash"></div>
      </div>
    </div>
    
    <div class="action-area">
      <button class="btn btn-start" onclick="startBooth()">
        📸 ถ่ายภาพ
      </button>
    </div>
    
    <div class="result-area">
      <canvas id="stripCanvas"></canvas>
    </div>
    
    <div class="action-area button-group">
      <button class="btn btn-save" onclick="downloadStrip()">
        💖 SAVE FULL STRIP (เซฟรวมแผ่นยาว)
      </button>
      <button class="btn btn-individual" onclick="downloadIndividual()">
        ✨ SAVE SEPARATE PHOTOS (แยกทีละรูปมีกรอบ)
      </button>
    </div>
    
  </div>
  
  <script src="script.js"></script>
  
</body>

</html>
