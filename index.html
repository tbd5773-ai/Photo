<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixie Photobooth 🧚✨</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="style.css">
</head>

<body>
  
  <div class="booth-card">
    
    <h1 class="main-title">✨ PIXIE PHOTOBOOTH ✨</h1>
    <p class="subtitle">มาบันทึกความทรงจำสุดน่ารักกันเถอะ! 💕</p>
    
    <div class="layout-selector">
      <label for="themeSelect">🎨 Select Theme:</label>
      <select id="themeSelect">
        <option value="pink">🌸 Pink Kawaii</option>
        <option value="black">🖤 Black Minimalist</option>
        <option value="blue">💎 Sky Blue</option>
        <option value="retro">🎞️ Retro Film</option>
      </select>
    </div>
    
    <div class="camera-wrapper">
      <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <div id="countdown">3</div>
        <div id="flash"></div>
      </div>
    </div>
    
    <div class="action-area">
      <button class="btn btn-start" onclick="startBooth()">
        📸 START PHOTOBOOTH
      </button>
    </div>
    
    <div class="result-area">
      <canvas id="stripCanvas"></canvas>
    </div>
    
    <div class="action-area button-group">
      <button class="btn btn-save" onclick="downloadStrip()">
        💖 SAVE FULL STRIP (เรียง 4 รูป)
      </button>
      <button class="btn btn-individual" onclick="downloadIndividual()">
        ✨ SAVE SEPARATE PHOTOS (แยกทีละรูปมีกรอบ)
      </button>
    </div>
    
  </div>
  
  <script src="script.js"></script>
  
</body>

</html>
